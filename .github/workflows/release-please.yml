---
name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: normfn
          include-v-in-tag: false

  build-deb:
    runs-on: ubuntu-24.04
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-installer
      - name: Build Debian package
        run: make builddeb
      - name: Upload Debian package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} ./*.deb

  build-arch:
    runs-on: ubuntu-24.04
    container: archlinux:latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git python python-build python-installer \
            python-hatchling python-hatch-vcs github-cli
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build Arch Linux package
        run: |
          useradd -m builduser
          chown -R builduser:builduser .
          runuser -u builduser -- make buildarch
      - name: Upload Arch package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          gh release upload ${{ needs.release-please.outputs.tag_name }} ./*.pkg.tar.zst
